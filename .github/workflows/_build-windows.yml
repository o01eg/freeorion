name: "Windows"

on:
  workflow_call:
jobs:
  windows-2022-cmake:
    name: MSVS 2022 on Windows CMake
    runs-on: windows-2022
    steps:
      - name: Checkout sources
        uses: actions/checkout@v3
      - name: Download SDK
        id: download-sdk
        uses: suisei-cn/actions-download-file@v1.4.0
        with:
          url: https://github.com/freeorion/freeorion-sdk/releases/download/v18/FreeOrionSDK_18_MSVC-v143-x64.zip
          target: ../
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.3.1
        with:
          vs-prerelease: true
      - name: Configure
        shell: pwsh
        run: |
          Remove-Item -LiteralPath "C:/hostedtoolcache/windows/Python/" -Force -Recurse # Ensure that system Python is not used
          unzip -q ../${{ steps.download-sdk.outputs.filename }} -d ..
          mkdir build
          pushd build
          cmake -G "Visual Studio 17 2022" -T "v143" -A x64 -DBUILD_TESTING=On -DBUILD_CLIENT_GODOT=Off -DCMAKE_C_FLAGS=/MP -DCMAKE_CXX_FLAGS=/MP -DCMAKE_BUILD_TYPE=RelWithDebInfo ..
      - name: Build
        shell: pwsh
        run: |
          pushd build
          cmake --build . --config "RelWithDebInfo" -- /maxcpucount /property:BuildInParallel=true /property:CL_MPCount=2 /verbosity:minimal
      - name: Test
        shell: pwsh
        working-directory: build
        run: |
          $env:Path += ";$($pwd.Path)\\RelWithDebInfo"
          cmake --build . --config "RelWithDebInfo" --target unittest
      - name: Test dumping species
        shell: pwsh
        working-directory: build
        run: |
          $env:Path += ";$($pwd.Path)\\RelWithDebInfo"
          $env:FO_CHECKSUM_SPECIES_NAME = "SP_CELESTEPHYTE"
          fo_unittest_parse.exe --run_test=TestDefaultPythonParser/parse_species_full --log_level=message
      - name: Generate binaries only
        run: |
          pushd build
          cpack -V -C RelWithDebInfo -G ZIP -D CPACK_ARCHIVE_COMPONENT_INSTALL=ON -D CPACK_MONOLITHIC_INSTALL=OFF -D "CPACK_COMPONENTS_ALL=binaries;binaries-test;debug-symbols"
      - name: Upload binaries artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-artifacts-sf-windows-${{ github.run_number }}
          path: build/FreeOrion_*.zip
          if-no-files-found: error
          retention-days: 1
